port: 8402

# 默认路由配置。
# 当请求里传 model=auto 时，会使用这里指定的 profile。
profile: balanced

debug_http: false
debug_transcript: false
request_timeout_sec: 45
models_timeout_sec: 15

# 自定义层级模型映射。
# 每个层级的第一个模型是主模型，后续模型按顺序作为 fallback。
profiles:
  auto:
    simple:
      - google/gemini-2.5-flash-lite
      - deepseek/deepseek-chat
    medium:
      - google/gemini-2.5-flash
      - deepseek/deepseek-chat
      - google/gemini-2.5-flash-lite
    complex:
      - google/gemini-2.5-pro
      - google/gemini-2.5-flash
      - deepseek/deepseek-chat
    reasoning:
      - anthropic/claude-sonnet-4
      - deepseek/deepseek-r1
      - openai/o3

  eco:
    simple:
      - google/gemini-2.5-flash-lite
      - deepseek/deepseek-chat
    medium:
      - google/gemini-2.5-flash-lite
      - deepseek/deepseek-chat
    complex:
      - google/gemini-2.5-flash
      - deepseek/deepseek-chat
    reasoning:
      - deepseek/deepseek-r1
      - google/gemini-2.5-flash

  # 适合 OpenClaw / coding agent 的平衡型配置。
  # 这个配置优先保留较大的 context window，并偏向 tool-calling / coding 可靠性。
  balanced:
    simple:
      - google/gemini-2.5-flash
      - openai/gpt-5-mini
      - google/gemini-2.5-flash-lite
    medium:
      - openai/gpt-5-mini
      - google/gemini-2.5-flash
      - google/gemini-2.5-pro
    complex:
      - anthropic/claude-sonnet-4.6
      - openai/gpt-5.1
      - google/gemini-2.5-pro
    reasoning:
      - openai/gpt-5.2
      - anthropic/claude-sonnet-4.6
      - openai/gpt-5.1

  # 适合 OpenClaw / coding agent 的性价比配置。
  # 这组更强调 cost/performance，比 balanced 更便宜，但统一按 262k 上下文能力来使用更稳妥。
  value:
    simple:
      - google/gemini-3.1-flash-lite-preview
      - qwen/qwen3-coder-next
      - google/gemini-2.5-flash-lite
    medium:
      - qwen/qwen3-coder-next
      - google/gemini-3.1-flash-lite-preview
      - qwen/qwen3-coder:exacto
    complex:
      - qwen/qwen3-coder:exacto
      - google/gemini-3-flash-preview
      - qwen/qwen3-coder-next
    reasoning:
      - google/gemini-3-flash-preview
      - qwen/qwen3-coder:exacto
      - openai/gpt-5-mini

  my-custom:
    simple:
      - deepseek/deepseek-chat
    medium:
      - openai/gpt-4o-mini
      - google/gemini-2.5-flash
    complex:
      - openai/gpt-4o
      - anthropic/claude-sonnet-4
    reasoning:
      - openai/o3
      - anthropic/claude-sonnet-4
